<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Konvergensi Simulated Annealing</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}
.container{
    background: white;
    padding: 20px;
    border-radius: 8px;
    max-width: 950px;
    margin: auto;
}
</style>
</head>

<body>

<div class="container">
<h2>Konvergensi Simulated Annealing — Distribusi MBG Sukolilo</h2>
<p>Sumbu X: Iterasi Pendinginan | Sumbu Y: Jarak Terbaik (km)</p>
<canvas id="chart" height="400"></canvas>
</div>

<script>
fetch('konvergensi_SA.json')
.then(res => res.json())
.then(data => {

    const colors = [
        "#1f77b4","#2ca02c","#d62728",
        "#9467bd","#ff7f0e","#17becf","#8c564b"
    ];

    const datasets = Object.keys(data).map((key, i) => ({
        label: key,
        data: data[key],
        borderColor: colors[i % colors.length],
        backgroundColor: colors[i % colors.length] + "22",
        borderWidth: 2,
        pointRadius: 0,
        fill: false,
        tension: 0.3
    }));

    const maxLen = Math.max(...Object.values(data).map(d => d.length));
    const labels = Array.from({length: maxLen}, (_, i) => i + 1);

    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: { labels: labels, datasets: datasets },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' },
                title: {
                    display: true,
                    text: 'Grafik Konvergensi Simulated Annealing'
                }
            },
            scales: {
                x: { title: { display: true, text: 'Iteration (Cooling Step)' } },
                y: { title: { display: true, text: 'Best Distance (km)' } }
            }
        }
    });

});
</script>

</body>
</html>
